name: Refresh First Table Data

on:
  schedule:
    # Run daily at 9:05 PM NZST (08:05 UTC) — right after new slots drop at 9 PM
    - cron: '5 8 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch restaurant data
        run: node scripts/fetch-data.mjs

      - name: Enrich data
        run: node scripts/enrich-data.mjs

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet public/data.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        env:
          COMMIT_DATE: ${{ github.event.repository.updated_at }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          TODAY=$(date -u +%Y-%m-%d)
          git commit -m "Refresh First Table data ${TODAY}"
          git push
